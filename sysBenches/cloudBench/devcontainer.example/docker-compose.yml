name: sys-benches

services:
  cloud-bench:
    image: cloud-bench:${USER:-workbench}
    container_name: cloud-bench
    command: sleep infinity
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    environment:
      - USER=${USER:-workbench}
      - DOCKER_HOST=unix:///var/run/docker.sock
    privileged: true
    network_mode: host
