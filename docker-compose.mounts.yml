# Shared Mount Configuration for All WorkBenches
# Reference template for volume mounts — see docs/MOUNTS-README.md for canonical docs
#
# Note: Most benches now use devcontainer.json "mounts" instead of docker-compose.
# This file remains as a reference template for benches still using docker-compose
# (e.g. frappeBench) and as a quick-copy source.

version: '3.8'

# Extension field - reusable mount definitions
x-standard-mounts: &standard-mounts
  # Workspace
  - ../..:/workspace:cached
  - ~/projects:/projects:cached

  # Zsh history persistence
  - ${BENCH_NAME:-bench}-zshhistory:/home/${USER}/.zsh_history

  # Shell configurations (readonly — host user's actual config)
  - ~/.zshrc:/home/${USER}/.zshrc:ro
  - ~/.oh-my-zsh:/home/${USER}/.oh-my-zsh:ro
  - ~/.p10k.zsh:/home/${USER}/.p10k.zsh:ro
  - ~/.bashrc:/home/${USER}/.bashrc:ro

  # Development credentials (readonly)
  - ~/.gitconfig:/home/${USER}/.gitconfig:ro
  - ~/.ssh:/home/${USER}/.ssh:ro
  - ~/.config/gh:/home/${USER}/.config/gh:ro

  # AI Coding Assistant Credentials (from Layer 0)
  # See docs/MOUNTS-README.md for full details per tool
  #
  # Claude Code (native installer)
  - ~/.claude:/home/${USER}/.claude:cached
  - ~/.claude.json:/home/${USER}/.claude.json:cached
  # OpenAI Codex (@openai/codex via npm)
  - ~/.codex:/home/${USER}/.codex:cached
  # Google Gemini (@google/gemini-cli via npm)
  - ~/.gemini:/home/${USER}/.gemini:cached
  # Grok (@xai-org/grok-cli via npm)
  - ~/.grok:/home/${USER}/.grok:ro
  # GitHub Copilot (@githubnext/github-copilot-cli via npm)
  - ~/.copilot-cli:/home/${USER}/.copilot-cli:ro
  # NotebookLM CLI (notebooklm-py via uv, auth on host browser)
  - ~/.notebooklm:/home/${USER}/.notebooklm:cached
  # NotebookLM MCP CLI (notebooklm-mcp-cli via uv, auth on host browser)
  - ~/.notebooklm-mcp-cli:/home/${USER}/.notebooklm-mcp-cli:cached

  # Optional: Docker socket (only for benches with Docker CLI)
  # - /var/run/docker.sock:/var/run/docker.sock

# Example service template
services:
  example-service:
    volumes: *standard-mounts

# AI Tools Installed in Layer 0 (workbench-base)
# Source of truth: base-image/install-ai-clis.sh
# Mount reference: docs/MOUNTS-README.md
#
# Installed AI CLIs and credential paths:
#   Claude Code     (native installer)                  → ~/.claude/, ~/.claude.json
#   OpenAI Codex    (@openai/codex via npm)              → ~/.codex/
#   Google Gemini   (@google/gemini-cli via npm)         → ~/.gemini/
#   Grok            (@xai-org/grok-cli via npm)          → ~/.grok/
#   GitHub Copilot  (@githubnext/github-copilot-cli npm) → ~/.copilot-cli/
#   OpenCode        (Opensoft fork, built from source)   → config in image (/etc/skel)
#   oh-my-opencode  (darrenhinde fork, built)            → plugin at /opt/opencode/plugin
#   Letta Code      (@letta-ai/letta-code via npm)       → env vars / interactive
#   OpenSpec        (@fission-ai/openspec via npm)       → no credentials
#   spec-kit        (specify-cli via uv)                 → no credentials
#   NotebookLM CLI  (notebooklm-py via uv)               → ~/.notebooklm/
#   NotebookLM MCP  (notebooklm-mcp-cli via uv)          → ~/.notebooklm-mcp-cli/
