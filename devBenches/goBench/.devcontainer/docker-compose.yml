# Project name for organizing all DevBench containers in Docker Desktop
# This creates the dev-bench project with go_bench, dot_net_bench, java_bench, etc.
name: dev-benches

services:
  go-bench:
    env_file: ../.env
    image: go-bench:${USER:-brett}
    container_name: go-bench
    command: sleep infinity
    working_dir: /workspace
    privileged: true
    tty: true
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - GOPATH=/go
      - GOBIN=/go/bin
