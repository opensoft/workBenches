name: dev-benches

services:
  sonarqube-mcp:
    image: ${SONARQUBE_MCP_IMAGE:-mcp/sonarqube:latest}
    container_name: ${SONARQUBE_MCP_CONTAINER:-sonarqube-mcp}
    restart: unless-stopped
    pull_policy: missing
    labels:
      devbench.shared-service: sonarqube-mcp
    environment:
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN}
      # A null value inherits SONARQUBE_ORG when exported and omits it when
      # unset, preserving SonarQube Server mode for self-hosted URLs.
      SONARQUBE_ORG:
      SONARQUBE_URL: ${SONARQUBE_URL:-https://sonarcloud.io}
      SONARQUBE_TRANSPORT: http
      SONARQUBE_HTTP_HOST: 0.0.0.0
      SONARQUBE_HTTP_PORT: ${SONARQUBE_MCP_BACKEND_PORT:-64131}
      SONARQUBE_HTTP_AUTH_MODE: TOKEN
    volumes:
      - sonarqube-mcp-storage:/app/storage
    networks:
      - devbench-shared

  sonarqube-mcp-proxy:
    image: ${SONARQUBE_MCP_PROXY_IMAGE:-nginx:alpine}
    container_name: ${SONARQUBE_MCP_PROXY_CONTAINER:-sonarqube-mcp-proxy}
    restart: unless-stopped
    pull_policy: missing
    labels:
      devbench.shared-service: sonarqube-mcp-proxy
    ports:
      - "${SONARQUBE_MCP_HOST_BIND:-127.0.0.1}:${SONARQUBE_MCP_PORT:-64130}:${SONARQUBE_MCP_PORT:-64130}"
    environment:
      SONARQUBE_TOKEN: ${SONARQUBE_TOKEN}
      PROXY_PORT: ${SONARQUBE_MCP_PORT:-64130}
      BACKEND_URL: http://${SONARQUBE_MCP_CONTAINER:-sonarqube-mcp}:${SONARQUBE_MCP_BACKEND_PORT:-64131}
    command:
      - sh
      - -c
      - |
        cat > /etc/nginx/conf.d/default.conf <<EOF
        server {
          listen $${PROXY_PORT};
          server_name _;

          location / {
            proxy_http_version 1.1;
            proxy_set_header Authorization "Bearer $${SONARQUBE_TOKEN}";
            proxy_set_header Host \$$host;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_pass $${BACKEND_URL};
          }
        }
        EOF
        exec nginx -g "daemon off;"
    depends_on:
      - sonarqube-mcp
    networks:
      - devbench-shared

networks:
  devbench-shared:
    name: ${SONARQUBE_MCP_NETWORK:-devbench-shared}
    external: true

volumes:
  sonarqube-mcp-storage:
    name: ${SONARQUBE_MCP_STORAGE_VOLUME:-devbench-sonarqube-mcp-storage}
    external: true
